name: Interview Flow Regression Checks

on:
  pull_request:
  workflow_dispatch:

jobs:
  interview-flow-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run interview flow regression checks
        run: npm run test:regression:all
