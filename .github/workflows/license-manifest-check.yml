name: License Manifest Check

on:
  pull_request:
  workflow_dispatch:

jobs:
  license-manifest-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify frontend license manifest
        run: npm run check:licenses --workspace=@interviewforge/web
